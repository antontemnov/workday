name: Release Tray App

on:
  push:
    tags:
      - 'tray-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#tray-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Patch version in tauri.conf.json
        shell: bash
        working-directory: tray-app/src-tauri
        run: |
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('tauri.conf.json', 'utf8'));
            conf.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Patch version in Cargo.toml
        shell: bash
        working-directory: tray-app/src-tauri
        run: |
          sed -i.bak 's/^version = ".*"/version = "${{ steps.version.outputs.version }}"/' Cargo.toml
          rm -f Cargo.toml.bak

      - name: Install frontend dependencies
        working-directory: tray-app
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          projectPath: tray-app
          tagName: ${{ github.ref_name }}
          releaseName: 'Workday Tray App ${{ github.ref_name }}'
          releaseBody: 'See the assets for download links. Auto-update enabled.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
          includeUpdaterJson: true
